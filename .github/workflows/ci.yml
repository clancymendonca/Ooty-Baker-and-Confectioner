name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUTH_SESSION_SECRET: ci-test-secret-do-not-use-in-production-must-be-32+chars
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Apply migrations (for production build)
        run: npx prisma migrate deploy

      - name: Production build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-and-test
    env:
      AUTH_SESSION_SECRET: ci-test-secret-do-not-use-in-production-must-be-32+chars
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
